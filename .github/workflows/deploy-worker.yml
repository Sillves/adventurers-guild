name: Deploy leaderboard worker

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Ensure D1 database exists and inject its id
        run: |
          set -euo pipefail
          DB_NAME=adventurers-guild-db
          DB_ID=$(npx wrangler d1 list --json | jq -r --arg n "$DB_NAME" '.[] | select(.name == $n) | .uuid')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "Creating D1 database $DB_NAME"
            npx wrangler d1 create "$DB_NAME" > /dev/null
            DB_ID=$(npx wrangler d1 list --json | jq -r --arg n "$DB_NAME" '.[] | select(.name == $n) | .uuid')
          fi
          test -n "$DB_ID"
          sed -i "s/__DATABASE_ID__/$DB_ID/" worker/wrangler.toml

      - name: Type-check worker
        run: npx tsc -p worker/tsconfig.json

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply adventurers-guild-db --remote -c worker/wrangler.toml

      - name: Deploy worker
        run: |
          set -euo pipefail
          npx wrangler deploy -c worker/wrangler.toml | tee deploy.log
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | head -1)
          echo "WORKER_URL=$URL" >> "$GITHUB_ENV"

      - name: Smoke test
        run: |
          set -euo pipefail
          test -n "$WORKER_URL"
          sleep 5
          echo "Smoke testing $WORKER_URL"
          curl -sf "$WORKER_URL/top" | jq -e '.players | type == "array"'
